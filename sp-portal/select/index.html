<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select company – Service Provider Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../access-select.css" />
  <link rel="stylesheet" href="../../liquid-glass.css" />
  <link rel="stylesheet" href="../../modern-ui.css" />
  <link rel="stylesheet" href="../../refinements-v2.css" />
  <link rel="stylesheet" href="../../refinements-v3-motion.css" />
</head>
<body>
  <div class="access-select-page">
    <header class="access-select-header">
      <h1>Service Provider Portal</h1>
      <p>Select your company to enter the portal</p>
    </header>

    <div class="access-select-grid" style="max-width: 420px;">
      <div class="access-select-card" style="cursor: default;">
        <div class="access-select-card-icon access-select-card-icon--sp" style="margin-bottom: 1rem;">
          <i class="bi bi-building"></i>
        </div>
        <h2>Your company</h2>
        <form id="selectSpForm" class="mt-3">
          <label for="spSelect" class="form-label visually-hidden">Service Provider</label>
          <select id="spSelect" class="form-select form-select-lg" required aria-label="Select your company">
            <option value="">— Select company —</option>
          </select>
          <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
            <i class="bi bi-box-arrow-in-right"></i> Enter portal
          </button>
        </form>
        <a href="../../dhl/access-select/index.html" class="btn btn-outline-secondary w-100 mt-2">
          <i class="bi bi-arrow-left"></i> Back to access selection
        </a>
      </div>
    </div>
  </div>

  <script src="../../dhl-mock-data.js" defer></script>
  <script defer>
    (function () {
      'use strict';
      var sel = document.getElementById('spSelect');
      var form = document.getElementById('selectSpForm');
      if (!sel || !form) return;

      var list = (window.DHL_MOCK_DATA && window.DHL_MOCK_DATA.serviceProviders && Array.isArray(window.DHL_MOCK_DATA.serviceProviders))
        ? window.DHL_MOCK_DATA.serviceProviders
        : [
            { id: 'tbx', name: 'TBX' }
          ];
      list.forEach(function (sp) {
        var name = (sp && sp.name) ? sp.name : (typeof sp === 'string' ? sp : '—');
        if (!name) return;
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var sp = sel.value.trim();
        if (!sp) return;
        try { sessionStorage.setItem('dhl_sp_portal_current_sp', sp); } catch (err) {}
        window.location.href = '../dashboard/index.html?sp=' + encodeURIComponent(sp);
      });
    })();
  </script>
  <script src="../../refinements-v3-motion.js" defer></script>
</body>
</html>
