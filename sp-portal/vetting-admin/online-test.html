<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Test — BA Express Driver Vetting</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 2rem 1rem;
    }
    .test-shell {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }
    .test-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
    .test-subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 1.75rem; }
    .test-question { margin-bottom: 1.5rem; }
    .test-question-title { font-weight: 600; margin-bottom: 0.5rem; }
    .test-scale { display: flex; gap: 0.5rem; }
    .test-scale label {
      flex: 1;
      text-align: center;
      border: 1px solid #e9ecef;
      border-radius: 0.5rem;
      padding: 0.5rem 0;
      cursor: pointer;
      font-size: 0.85rem;
      user-select: none;
    }
    .test-scale input { display: none; }
    .test-scale input:checked + span {
      display: block;
    }
    .test-scale label:has(input:checked) {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }
    .test-result {
      text-align: center;
      padding: 2rem 0;
    }
    .test-result-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: #6366f1;
    }
  </style>
</head>
<body>
  <div class="test-shell">
    <div id="testForm">
      <h1 class="test-title">Driver Suitability Online Test</h1>
      <p class="test-subtitle" id="candidateLabel">Candidate</p>
      <form id="onlineTestForm"></form>
      <button type="button" class="btn btn-primary w-100" id="btnSubmitTest">Submit test</button>
    </div>
    <div id="testResult" class="test-result d-none">
      <p class="test-subtitle">Test submitted</p>
      <p class="test-result-score" id="testResultScore">0/25</p>
      <p class="text-muted">You can close this tab now — the score has been sent back to the vetting admin panel.</p>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      'Timeliness and punctuality',
      'Route knowledge and navigation',
      'Customer interaction and professionalism',
      'Vehicle care and safety awareness',
      'Reliability under pressure'
    ];

    const params = new URLSearchParams(window.location.search);
    const candidateId = params.get('candidate') || '';
    const candidateName = params.get('name') || 'Candidate';
    document.getElementById('candidateLabel').textContent = candidateName;

    const form = document.getElementById('onlineTestForm');
    form.innerHTML = QUESTIONS.map((q, i) => `
      <div class="test-question">
        <p class="test-question-title">${i + 1}. ${q}</p>
        <div class="test-scale">
          ${[1, 2, 3, 4, 5].map(v => `
            <label><input type="radio" name="q${i}" value="${v}" ${v === 3 ? 'checked' : ''} /><span>${v}</span></label>
          `).join('')}
        </div>
      </div>
    `).join('');

    document.getElementById('btnSubmitTest').addEventListener('click', () => {
      let total = 0;
      QUESTIONS.forEach((_, i) => {
        const checked = form.querySelector(`input[name="q${i}"]:checked`);
        total += checked ? Number(checked.value) : 0;
      });

      document.getElementById('testForm').classList.add('d-none');
      document.getElementById('testResult').classList.remove('d-none');
      document.getElementById('testResultScore').textContent = `${total}/${QUESTIONS.length * 5}`;

      if (window.opener) {
        window.opener.postMessage({ type: 'online-test-complete', candidateId, score: total, maxScore: QUESTIONS.length * 5 }, window.location.origin);
      }
    });
  </script>
</body>
</html>
