      function loadCachedComments() {
        try {
          var raw = localStorage.getItem(SOP_CACHE_KEY);
          if (!raw) return;
          var cached = JSON.parse(raw);
          if (!cached || typeof cached !== 'object') return;
          Object.keys(cached).forEach(function (postIdStr) {
            var postId = parseInt(postIdStr, 10);
            var post = MOCK_POSTS.find(function (p) { return p.id === postId; });
            if (post && Array.isArray(cached[postIdStr])) {
              post.commentList = (post.commentList || []).concat(cached[postIdStr]);
              post.comments = (post.commentList || []).length;
            }
          });
        } catch (e) {}
      }
      function saveCommentToCache(postId, comment) {
        try {
          var raw = localStorage.getItem(SOP_CACHE_KEY);
          var cached = raw ? JSON.parse(raw) : {};
          if (typeof cached !== 'object') cached = {};
          var key = String(postId);
          if (!cached[key]) cached[key] = [];
          cached[key].push(comment);
          localStorage.setItem(SOP_CACHE_KEY, JSON.stringify(cached));
        } catch (e) {}
      }
      loadCachedComments();

      function escapeHtml(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;

        if (p.youtubeVideoId) {
          var vid = escapeHtml(p.youtubeVideoId);
          var watchUrl = 'https://www.youtube.com/watch?v=' + vid;
          var thumbUrl = 'https://img.youtube.com/vi/' + vid + '/hqdefault.jpg';
          mediaHtml = '<a href="' + watchUrl + '" target="_blank" rel="noopener noreferrer" class="sop-post-media sop-post-media--youtube sop-youtube-link" title="Watch on YouTube">' +
            '<span class="sop-youtube-thumb" style="background-image:url(\'' + thumbUrl + '\')"></span>' +
            '<span class="sop-youtube-play"><i class="bi bi-play-circle-fill"></i></span>' +
            '<span class="sop-youtube-label">Watch on YouTube</span>' +
            '</a>';
        } else if (p.video) {
          mediaHtml = '<div class="sop-post-media sop-post-media--video"><video controls preload="metadata"><source src="' + escapeHtml(asset(p.video)) + '" type="video/mp4">Your browser does not support the video tag.</video></div>';
        } else if (p.image) {
          mediaHtml = '<div class="sop-post-media sop-post-media--image"><img src="' + escapeHtml(asset(p.image)) + '" alt="" /></div>';
        }
        return (
          '<article class="sop-post" data-id="' + p.id + '">' +
            '<div class="sop-post-header">' +
              '<div class="sop-post-avatar">' +
                '<img src="' + escapeHtml(asset(p.authorAvatar)) + '" alt="" width="40" height="40" />' +
              '</div>' +
              '<div class="sop-post-meta">' +
                '<strong class="sop-post-author">' + escapeHtml(p.author) + '</strong>' +
                '<span class="sop-post-badge sop-post-badge--' + p.type + '">' + escapeHtml(typeLabel) + '</span>' +
                '<span class="sop-post-time">' + escapeHtml(p.timeAgo) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="sop-post-body">' +
              (p.title ? '<h3 class="sop-post-title">' + escapeHtml(p.title) + '</h3>' : '') +
              '<p class="sop-post-content">' + escapeHtml(p.content) + '</p>' +
              mediaHtml +
            '</div>' +
            '<div class="sop-post-actions">' +
              '<button type="button" class="' + likeClass + '" data-action="like" data-id="' + p.id + '">' +
                '<i class="bi bi-' + (p.liked ? 'heart-fill' : 'heart') + '"></i>' +
                '<span>' + (p.liked ? 'Liked' : 'Like') + '</span>' +
                (p.likes > 0 ? '<span class="sop-action-count">' + p.likes + '</span>' : '') +
              '</button>' +
              '<button type="button" class="sop-action-btn" data-action="comment" data-id="' + p.id + '">' +
                '<i class="bi bi-chat"></i>' +
                '<span>Comment</span>' +
              '</button>' +
            '</div>' +
          '</article>'
        );
      }

      function getPostHtml(p, isDetail) {
        var typeLabel = p.type === 'tutorial' ? 'Tutorial' : p.type === 'update' ? 'Update' : 'Info';
        var likeClass = p.liked ? 'sop-action-btn sop-action-btn--active' : 'sop-action-btn';
        var mediaHtml = '';
        if (p.youtubeVideoId) {
          var vid = escapeHtml(p.youtubeVideoId);
          var watchUrl = 'https://www.youtube.com/watch?v=' + vid;
          var thumbUrl = 'https://img.youtube.com/vi/' + vid + '/hqdefault.jpg';
          mediaHtml = '<a href="' + watchUrl + '" target="_blank" rel="noopener noreferrer" class="sop-post-media sop-post-media--youtube sop-youtube-link" title="Watch on YouTube">' +
            '<span class="sop-youtube-thumb" style="background-image:url(\'' + thumbUrl + '\')"></span>' +
            '<span class="sop-youtube-play"><i class="bi bi-play-circle-fill"></i></span>' +
            '<span class="sop-youtube-label">Watch on YouTube</span>' +
            '</a>';
        } else if (p.video) {
          mediaHtml = '<div class="sop-post-media sop-post-media--video"><video controls preload="metadata"><source src="' + escapeHtml(asset(p.video)) + '" type="video/mp4">Your browser does not support the video tag.</video></div>';
        } else if (p.image) {
          mediaHtml = '<div class="sop-post-media sop-post-media--image"><img src="' + escapeHtml(asset(p.image)) + '" alt="" /></div>';
        }
        return '<div class="sop-post-header">' +
          '<div class="sop-post-avatar"><img src="' + escapeHtml(asset(p.authorAvatar)) + '" alt="" width="40" height="40" /></div>' +
          '<div class="sop-post-meta">' +
            '<strong class="sop-post-author">' + escapeHtml(p.author) + '</strong>' +
            '<span class="sop-post-badge sop-post-badge--' + p.type + '">' + escapeHtml(typeLabel) + '</span>' +
            '<span class="sop-post-time">' + escapeHtml(p.timeAgo) + '</span>' +
          '</div></div>' +
          '<div class="sop-post-body">' +
            (p.title ? '<h3 class="sop-post-title">' + escapeHtml(p.title) + '</h3>' : '') +
            '<p class="sop-post-content">' + escapeHtml(p.content) + '</p>' + mediaHtml +
          '</div>' +
          '<div class="sop-post-actions">' +
            '<button type="button" class="' + likeClass + '" data-action="like" data-id="' + p.id + '">' +
              '<i class="bi bi-' + (p.liked ? 'heart-fill' : 'heart') + '"></i><span>' + (p.liked ? 'Liked' : 'Like') + '</span>' +
              (p.likes > 0 ? '<span class="sop-action-count">' + p.likes + '</span>' : '') +
            '</button>' +
            '<button type="button" class="sop-action-btn" data-action="comment" data-id="' + p.id + '">' +
              '<i class="bi bi-chat"></i><span>Comment</span>' +
            '</button>' +
          '</div>' +
          getCommentsHtml(p);
      }

      function getCommentsHtml(p) {
        var list = p.commentList || [];
        var items = list.map(function (c) {
          var authorDisplay = (c.author || 'DHL Uk') + (c.company ? ' (' + c.company + ')' : '');
          return '<div class="sop-comment">' +
            '<div class="sop-comment-avatar"><img src="' + escapeHtml(asset(c.authorAvatar || 'assets/dhl-uk-logo.png')) + '" alt="" width="32" height="32" /></div>' +
            '<div class="sop-comment-body">' +
              '<strong class="sop-comment-author">' + escapeHtml(authorDisplay) + '</strong> ' +
              '<span class="sop-comment-time">' + escapeHtml(c.timeAgo || '') + '</span>' +
              '<p class="sop-comment-text">' + escapeHtml(c.text) + '</p>' +
            '</div>' +
          '</div>';
        }).join('');
        return '<div class="sop-comments">' +
          '<h4 class="sop-comments-title">Comments</h4>' +
          '<div class="sop-comments-list">' + items + '</div>' +
          '<form class="sop-comments-form" data-post-id="' + p.id + '">' +
            '<div class="sop-comments-input-wrap">' +
              '<img src="' + escapeHtml(asset('assets/dhl-uk-logo.png')) + '" alt="" class="sop-comment-input-avatar" width="32" height="32" />' +
              '<input type="text" class="sop-comments-input" placeholder="Write a comment..." maxlength="500" />' +
            '</div>' +
            '<button type="submit" class="sop-comments-submit">Comment</button>' +
          '</form>' +
        '</div>';
      }

      /** Reduced preview for the feed (no full media, truncated text). */
      function getPostPreviewHtml(p) {
        var typeLabel = p.type === 'tutorial' ? 'Tutorial' : p.type === 'update' ? 'Update' : 'Info';
        var contentPreview = (p.content || '').length > 90 ? (p.content.substring(0, 90) + '…') : (p.content || '');
        var thumbHtml = '';
        if (p.youtubeVideoId) {
          var thumbUrl = 'https://img.youtube.com/vi/' + escapeHtml(p.youtubeVideoId) + '/hqdefault.jpg';
          thumbHtml = '<span class="sop-post-preview-thumb sop-post-preview-thumb--video" style="background-image:url(\'' + thumbUrl + '\')"><i class="bi bi-play-fill"></i></span>';
        } else if (p.video) {
          thumbHtml = '<span class="sop-post-preview-thumb sop-post-preview-thumb--video"><i class="bi bi-play-fill"></i></span>';
        } else if (p.image) {
          thumbHtml = '<span class="sop-post-preview-thumb sop-post-preview-thumb--image" style="background-image:url(\'' + escapeHtml(asset(p.image)) + '\')"></span>';
        }
        return '<div class="sop-post-header">' +
          '<div class="sop-post-avatar"><img src="' + escapeHtml(asset(p.authorAvatar)) + '" alt="" width="40" height="40" /></div>' +
          '<div class="sop-post-meta">' +
            '<strong class="sop-post-author">' + escapeHtml(p.author) + '</strong>' +
            '<span class="sop-post-badge sop-post-badge--' + p.type + '">' + escapeHtml(typeLabel) + '</span>' +
            '<span class="sop-post-time">' + escapeHtml(p.timeAgo) + '</span>' +
          '</div></div>' +
          '<div class="sop-post-body">' +
            (p.title ? '<h3 class="sop-post-title">' + escapeHtml(p.title) + '</h3>' : '') +
            '<p class="sop-post-content sop-post-content--preview">' + escapeHtml(contentPreview) + '</p>' +
            (thumbHtml ? '<div class="sop-post-preview-media">' + thumbHtml + '</div>' : '') +
          '</div>' +
          '<span class="sop-post-preview-cta">View post</span>';
      }

      function render() {
        var feed = document.getElementById('sopFeed');
        if (!feed) return;
        feed.innerHTML = MOCK_POSTS.map(function (p) {
          return '<article class="sop-post sop-post--preview" data-id="' + p.id + '" role="button" tabindex="0">' + getPostPreviewHtml(p) + '</article>';
        }).join('');
      }

      var openPostId = null;

      function openPost(id) {
        openPostId = id;
        var post = MOCK_POSTS.find(function (p) { return p.id === id; });
        if (!post) return;
        var detail = document.getElementById('sopPostDetail');
        var content = document.getElementById('sopPostDetailContent');
        var placeholder = document.getElementById('sopPostDetailPlaceholder');
        var closeBtn = document.getElementById('sopPostDetailClose');
        if (detail && content) {
          if (placeholder) placeholder.style.display = 'none';
          if (closeBtn) closeBtn.style.display = 'flex';
          content.innerHTML = '<article class="sop-post sop-post--detail" data-id="' + post.id + '">' + getPostHtml(post) + '</article>';
          detail.classList.add('sop-post-detail--open');
          detail.setAttribute('aria-hidden', 'false');
        }
      }

      function closePost() {
        openPostId = null;
        var detail = document.getElementById('sopPostDetail');
        var content = document.getElementById('sopPostDetailContent');
        var placeholder = document.getElementById('sopPostDetailPlaceholder');
        var closeBtn = document.getElementById('sopPostDetailClose');
        if (detail) {
          detail.classList.remove('sop-post-detail--open');
          detail.setAttribute('aria-hidden', 'true');
          if (placeholder) placeholder.style.display = '';
          if (closeBtn) closeBtn.style.display = 'none';
          if (content) content.innerHTML = '<p class="sop-post-detail-placeholder" id="sopPostDetailPlaceholder">Click a post to open it</p>';
        }
      }

      var pendingMedia = { image: null, video: null, doc: null, youtubeVideoId: null };

      /**
       * Creates a new post and adds it to the feed.
       * @param {Object} data - { title, content, type, image, video, youtubeVideoId, doc }
       * @returns {Object} The created post
       */
      function createNewPost(data) {
        var id = Date.now();
        var type = (data.type === 'update' || data.type === 'info') ? data.type : 'tutorial';
        var title = (data.title && data.title.trim()) ? data.title.trim() : null;
        if (!title && data.youtubeVideoId) title = 'YouTube video';
        var content = (data.content && data.content.trim()) ? data.content.trim() : getDefaultContent(data);
        var newPost = {
          id: id,
          author: 'DHL Uk',
          authorAvatar: 'assets/dhl-uk-logo.png',
          timeAgo: 'Just now',
          type: type,
          title: title,
          content: content,
          image: data.image || null,
          video: data.video || null,
          youtubeVideoId: data.youtubeVideoId || undefined,
          likes: 0,
          comments: 0,
          liked: false,
          commentList: []
        };
        MOCK_POSTS.unshift(newPost);
        return newPost;
      }

      function getDefaultContent(data) {
        if (data.youtubeVideoId) return 'Video shared on the platform.';
        if (data.video) return 'Shared a video.';
        if (data.image) return 'Shared a photo.';
        if (data.doc) return 'Shared a document.';
        return 'New post.';
      }

      function resetCreatePostForm() {
        var input = document.getElementById('sopCreateInput');
        var titleInput = document.getElementById('sopCreateTitle');
        var typeSelect = document.getElementById('sopCreateType');
        var photoInput = document.getElementById('sopPhotoInput');
        var videoInput = document.getElementById('sopVideoInput');
        var docInput = document.getElementById('sopDocInput');
        var youtubeUrlInput = document.getElementById('sopYoutubeUrl');
        if (input) input.value = '';
        if (titleInput) titleInput.value = '';
        if (typeSelect) typeSelect.value = 'tutorial';
        if (photoInput) photoInput.value = '';
        if (videoInput) videoInput.value = '';
        if (docInput) docInput.value = '';
        if (youtubeUrlInput) {
          youtubeUrlInput.value = '';
          youtubeUrlInput.style.display = 'none';
        }
        pendingMedia.image = null;
        pendingMedia.video = null;
        pendingMedia.doc = null;
        pendingMedia.youtubeVideoId = null;
      }

      function initCreatePost() {
        var input = document.getElementById('sopCreateInput');
        var titleInput = document.getElementById('sopCreateTitle');
        var typeSelect = document.getElementById('sopCreateType');
        var postBtn = document.getElementById('sopPostBtn');
        var photoInput = document.getElementById('sopPhotoInput');
        var videoInput = document.getElementById('sopVideoInput');
        var docInput = document.getElementById('sopDocInput');
        var youtubeUrlInput = document.getElementById('sopYoutubeUrl');
        var photoBtn = document.getElementById('sopPhotoBtn');
        var videoBtn = document.getElementById('sopVideoBtn');
        var docBtn = document.getElementById('sopDocBtn');
        var youtubeBtn = document.getElementById('sopYoutubeBtn');

        function canPost() {
          var hasText = input && (input.value || '').trim().length > 0;
          var hasMedia = pendingMedia.image || pendingMedia.video || pendingMedia.doc || pendingMedia.youtubeVideoId;
          return hasText || hasMedia;
        }

        function syncYoutubeFromInput() {
          var url = youtubeUrlInput && youtubeUrlInput.value ? youtubeUrlInput.value.trim() : '';
          pendingMedia.youtubeVideoId = parseYoutubeVideoId(url) || null;
          updatePostBtn();
        }

        function updatePostBtn() {
          if (postBtn) postBtn.disabled = !canPost();
        }

        if (input && postBtn) {
          input.addEventListener('input', updatePostBtn);
          if (titleInput) titleInput.addEventListener('input', updatePostBtn);
        }
        postBtn.addEventListener('click', function () {
          if (!canPost()) return;
          var title = titleInput ? (titleInput.value || '').trim() : '';
          var content = (input.value || '').trim();
          var type = typeSelect ? typeSelect.value : 'tutorial';
          var newPost = createNewPost({
            title: title || null,
            content: content,
            type: type,
            image: pendingMedia.image,
            video: pendingMedia.video,
            youtubeVideoId: pendingMedia.youtubeVideoId || undefined,
            doc: pendingMedia.doc || undefined
          });
          resetCreatePostForm();
          updatePostBtn();
          if (postBtn) postBtn.disabled = true;
          render();
          openPost(newPost.id);
        });

        if (photoBtn && photoInput) {
          photoBtn.addEventListener('click', function () { photoInput.click(); });
          photoInput.addEventListener('change', function () {
            var f = this.files && this.files[0];
            if (f && f.type.indexOf('image') === 0) {
              pendingMedia.image = URL.createObjectURL(f);
              pendingMedia.video = null;
              updatePostBtn();
            }
          });
        }
        if (videoBtn && videoInput) {
          videoBtn.addEventListener('click', function () { videoInput.click(); });
          videoInput.addEventListener('change', function () {
            var f = this.files && this.files[0];
            if (f && f.type.indexOf('video') === 0) {
              pendingMedia.video = URL.createObjectURL(f);
              pendingMedia.image = null;
              updatePostBtn();
            }
          });
        }
        if (docBtn && docInput) {
          docBtn.addEventListener('click', function () { docInput.click(); });
          docInput.addEventListener('change', function () {
            var f = this.files && this.files[0];
            if (f) {
              pendingMedia.doc = f.name;
              updatePostBtn();
            }
          });
        }

        if (youtubeBtn && youtubeUrlInput) {
          youtubeBtn.addEventListener('click', function () {
            var isVisible = youtubeUrlInput.style.display !== 'none';
            youtubeUrlInput.style.display = isVisible ? 'none' : 'inline-block';
            if (!isVisible) youtubeUrlInput.focus();
            else {
              youtubeUrlInput.value = '';
              pendingMedia.youtubeVideoId = null;
              updatePostBtn();
            }
          });
          youtubeUrlInput.addEventListener('input', syncYoutubeFromInput);
          youtubeUrlInput.addEventListener('paste', function () { setTimeout(syncYoutubeFromInput, 10); });
        }
      }

      function initFeedClicks() {
        var feed = document.getElementById('sopFeed');
        if (!feed) return;
        feed.addEventListener('click', function (e) {
          var card = e.target.closest('.sop-post--preview');
          if (!card) return;
          var id = parseInt(card.getAttribute('data-id'), 10);
          if (!isNaN(id)) openPost(id);
        });
      }

      function initDetailClose() {
        var closeBtn = document.getElementById('sopPostDetailClose');
        var backdrop = document.getElementById('sopPostDetailBackdrop');
        if (closeBtn) closeBtn.addEventListener('click', closePost);
        if (backdrop) backdrop.addEventListener('click', closePost);
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') closePost();
        });
      }

      function initLikeButtons() {
        document.body.addEventListener('click', function (e) {
          var btn = e.target.closest('[data-action="like"]');
          if (!btn) return;
          var id = parseInt(btn.getAttribute('data-id'), 10);
          var post = MOCK_POSTS.find(function (p) { return p.id === id; });
          if (!post) return;
          e.preventDefault();
          e.stopPropagation();
          post.liked = !post.liked;
          post.likes += post.liked ? 1 : -1;
          var content = document.getElementById('sopPostDetailContent');
          if (openPostId === id && content) {
            content.innerHTML = '<article class="sop-post sop-post--detail" data-id="' + post.id + '">' + getPostHtml(post) + '</article>';
          }
          requestAnimationFrame(function () { render(); });
        });
      }

      function initCommentForm() {
        document.body.addEventListener('submit', function (e) {
          var form = e.target.closest('.sop-comments-form');
          if (!form) return;
          e.preventDefault();
          var postId = parseInt(form.getAttribute('data-post-id'), 10);
          var input = form.querySelector('.sop-comments-input');
          if (!input || isNaN(postId)) return;
          var text = (input.value || '').trim();
          if (!text) return;
          var post = MOCK_POSTS.find(function (p) { return p.id === postId; });
          if (!post) return;
          var newComment = {
            author: 'DHL Uk',
            company: 'DHL Administration',
            authorAvatar: 'assets/dhl-uk-logo.png',
            text: text,
            timeAgo: 'Just now'
          };
          post.commentList = post.commentList || [];
          post.commentList.push(newComment);
          post.comments = (post.comments || 0) + 1;
          saveCommentToCache(postId, newComment);
          input.value = '';
          var content = document.getElementById('sopPostDetailContent');
          var openId = openPostId;
          requestAnimationFrame(function () {
            if (openId === postId && content) {
              content.innerHTML = '<article class="sop-post sop-post--detail" data-id="' + post.id + '">' + getPostHtml(post) + '</article>';
            }
            requestAnimationFrame(function () { render(); });
          });
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          render();
          initCreatePost();
          initFeedClicks();
          initDetailClose();
          initLikeButtons();
          initCommentForm();
        });
      } else {
        render();
        initCreatePost();
        initFeedClicks();
        initDetailClose();
        initLikeButtons();
        initCommentForm();
      }
    })();
  </script>
</body>
</html>
