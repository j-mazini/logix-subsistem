<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select access – DHL Subsystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../base-system-reference.css" />
  <link rel="stylesheet" href="../../modern-ui.css" />
  <style>
    .access-select-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 30%, #e8f4fc 60%, #f1f5f9 100%);
      font-family: var(--font-sans);
      position: relative;
      overflow: hidden;
    }
    .access-select-page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.12), transparent),
                  radial-gradient(ellipse 60% 40% at 100% 50%, rgba(14, 165, 233, 0.08), transparent),
                  radial-gradient(ellipse 60% 40% at 0% 80%, rgba(139, 92, 246, 0.08), transparent);
    }
    .access-select-header { position: relative; z-index: 1; text-align: center; margin-bottom: 2.5rem; }
    .access-select-header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.03em; color: #0f172a; margin-bottom: 0.5rem; }
    .access-select-header p { font-size: 1rem; color: #64748b; font-weight: 500; }
    .access-select-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 740px;
      width: 100%;
    }
    .access-select-card {
      display: block;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-decoration: none;
      color: inherit;
    }
    .access-select-card:focus { outline: 2px solid #6366f1; outline-offset: 2px; }
    .access-select-card-icon {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 1.25rem;
    }
    .access-select-card--dhl .access-select-card-icon { background: linear-gradient(135deg, #fef08a 0%, #fde047 100%); color: #d40511; box-shadow: 0 4px 14px rgba(250, 204, 21, 0.35); }
    .access-select-card--sp .access-select-card-icon { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: #fff; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
    .access-select-card h2 { font-size: 1.25rem; font-weight: 600; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .access-select-card p { font-size: 0.9rem; color: #64748b; margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="access-select-page">
    <header class="access-select-header">
      <h1>DHL Subsystem</h1>
      <p>Select which area you want to access</p>
    </header>

    <div class="access-select-grid">
      <a href="../dashboard/index.html" class="access-select-card access-select-card--dhl">
        <div class="access-select-card-icon"><i class="bi bi-building-gear"></i></div>
        <h2>DHL Administration</h2>
        <p>Dashboard, Service Providers, Vendors, Vehicles, Contracts, SOP Feed. Create alerts and posts.</p>
      </a>

      <a href="../../sp-portal/select/index.html" class="access-select-card access-select-card--sp">
        <div class="access-select-card-icon"><i class="bi bi-person-badge"></i></div>
        <h2>BA Express Portal</h2>
        <p>Access the BA Express portal: dashboard, profile, drivers, vehicles and contracts.</p>
      </a>
    </div>
  </div>
</body>
</html>
