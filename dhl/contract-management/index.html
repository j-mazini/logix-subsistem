<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contract Management – Administrative View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../vendor-admin-view.css" />
  <link rel="stylesheet" href="../../shared-pages.css" />
  <link rel="stylesheet" href="../../contract-management.css" />
  <link rel="stylesheet" href="../../sidebar-beam.css" />
  <link rel="stylesheet" href="../../liquid-glass.css" />
  <link rel="stylesheet" href="../../modern-ui.css" />
  <link rel="stylesheet" href="../../refinements-v2.css" />
  <link rel="stylesheet" href="../../refinements-v3-motion.css" />
</head>
<body class="has-beam-sidebar">
  <div class="sidebar-wrapper" id="sidebarWrapper">
    <div class="sidebar-gap" id="sidebarGap" aria-hidden="true"></div>
    <aside class="sidebar-container" id="sidebarContainer" aria-hidden="true"></aside>
    <div class="floating-sidebar-toggle" id="floatingSidebarToggle" aria-hidden="true"></div>

    <div class="beam-overlay" id="beamOverlay" aria-hidden="true"></div>
    <nav class="beam-sidebar" id="beamSidebar" data-state="closed" role="navigation" aria-label="Main menu">
      <button type="button" class="beam-trigger" id="beamTrigger" aria-label="Open menu" aria-expanded="false">
        <i class="bi bi-list beam-icon-menu"></i>
        <i class="bi bi-x-lg beam-icon-close"></i>
      </button>
      <div class="beam-rail" aria-hidden="true"></div>
      <div class="beam-plates">
        <a href="../dashboard/index.html" class="beam-plate">
          <i class="bi bi-house-door-fill beam-plate-icon"></i>
          <span>Home</span>
        </a>
        <a href="../../service-providers/index.html" class="beam-plate">
          <i class="bi bi-person-badge beam-plate-icon"></i>
          <span>Service Providers</span>
        </a>
        <a href="../vendor-admin-view/index.html" class="beam-plate">
          <i class="bi bi-building beam-plate-icon"></i>
          <span>Vendors</span>
        </a>
        <a href="../vehicles-admin-view/index.html" class="beam-plate">
          <i class="bi bi-truck beam-plate-icon"></i>
          <span>Vehicles</span>
        </a>
        <a href="index.html" class="beam-plate active">
          <i class="bi bi-file-earmark-text beam-plate-icon"></i>
          <span>Contract Management</span>
        </a>
        <a href="../standard-operating-procedures/index.html" class="beam-plate">
          <i class="bi bi-journal-bookmark-fill beam-plate-icon"></i>
          <span>SOP Feed</span>
        </a>
        <a href="../access-select/index.html" class="beam-plate beam-plate--switch">
          <i class="bi bi-arrow-left-right beam-plate-icon"></i>
          <span>Select access</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-inset" id="sidebarInset">
      <div class="liquid-glass-page-bg" aria-hidden="true"></div>
      <div class="page-container">
        <div class="page-inner">
          <main class="vendor-admin-main contract-management-main">
            <div class="admin-header d-flex flex-wrap align-items-center gap-2">
              <h1 class="admin-header-title">Contract Management</h1>
              <div class="admin-header-search flex-grow-1">
                <input
                  type="search"
                  id="searchInput"
                  class="form-control"
                  placeholder="Service provider, depot, loop, route, subpostcode..."
                  autocomplete="off"
                />
              </div>
              <div class="admin-header-user-pill d-flex align-items-center" title="DHL Uk">
                <img src="../../assets/dhl-uk-logo.png" alt="DHL Uk" class="admin-header-user-avatar admin-header-user-avatar--img" />
                <span class="admin-header-user-name">DHL Uk</span>
              </div>
            </div>

            <div class="admin-filters contract-filters" id="adminFilters">
              <div class="admin-filters-row row g-2 align-items-end flex-wrap">
                <div class="col-auto">
                  <label class="admin-filter-label form-label" for="filterServiceProvider">Service provider</label>
                  <select id="filterServiceProvider" class="admin-filter-select form-select form-select-sm" aria-label="Filter by service provider">
                    <option value="">All</option>
                  </select>
                </div>
                <div class="col-auto">
                  <label class="admin-filter-label form-label" for="filterDepot">Depot</label>
                  <select id="filterDepot" class="admin-filter-select form-select form-select-sm" aria-label="Filter by depot">
                    <option value="">All</option>
                    <option value="MSE">MSE</option>
                    <option value="LCY">LCY</option>
                    <option value="LSE">LSE</option>
                  </select>
                </div>
                <div class="col-auto">
                  <button type="button" class="admin-filter-clear btn btn-outline-secondary btn-sm" id="filterClearBtn" title="Clear filters">Clear filters</button>
                </div>
              </div>
            </div>

            <div id="depotManagerPanel" class="depot-manager-panel hidden" role="region" aria-label="Depot manager">
              <h3 class="depot-manager-title"><i class="bi bi-person-badge me-2"></i><span id="depotManagerTitle">Depot Manager</span></h3>
              <div id="depotManagerContent" class="depot-manager-content"></div>
            </div>

            <div class="contract-section-header">
              <h2 class="contract-section-title">
                <i class="bi bi-diagram-3"></i>
                My active contracts
              </h2>
            </div>

            <div id="contractTree" class="contract-tree"></div>

            <div id="emptyState" class="empty-state alert alert-light hidden" role="status">
              No contracts found.
            </div>
            <div id="loadingState" class="empty-state alert alert-light hidden" role="status">
              <span class="loading-spinner inline-block align-middle"></span>
              <span> Loading...</span>
            </div>
          </main>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dhl-mock-data.js"></script>
  <script src="../../beam-sidebar.js"></script>
  <script>
    (function () {
      'use strict';

      var SIDEBAR_STORAGE_KEY = 'dhl_subsystem_sidebar_state';
      function getSidebarOpen() {
        try { return localStorage.getItem(SIDEBAR_STORAGE_KEY) !== 'false'; } catch (e) { return true; }
      }
      function setSidebarOpen(open) {
        try { localStorage.setItem(SIDEBAR_STORAGE_KEY, open ? 'true' : 'false'); } catch (e) {}
      }
      function getSidebarState() {
        return getSidebarOpen() ? 'expanded' : 'collapsed';
      }
      function applySidebarState(state) {
        var wrapper = document.getElementById('sidebarWrapper');
        var gap = document.getElementById('sidebarGap');
        if (!wrapper || !gap) return;
        wrapper.setAttribute('data-sidebar-state', state);
        gap.setAttribute('data-sidebar-state', state);
        setSidebarOpen(state === 'expanded');
        window.dispatchEvent(new Event('resize'));
      }
      function postcodesToSubpostcodes(postcodes) {
        if (!postcodes || !postcodes.length) return [];
        var seen = {};
        var out = [];
        for (var i = 0; i < postcodes.length; i++) {
          var pc = String(postcodes[i]).trim();
          if (pc.length <= 2) continue;
          var sub = pc.slice(0, -2).trim();
          if (sub && !seen[sub]) { seen[sub] = true; out.push(sub); }
        }
        return out.sort();
      }

      var contractData = (window.DHL_MOCK_DATA && window.DHL_MOCK_DATA.contracts) ? window.DHL_MOCK_DATA.contracts : [];
      var ROUTE_TARGETS_STORAGE_KEY = 'dhl_contract_route_targets';

      function getStoredTarget(spName, depotName, routeName) {
        try {
          var raw = localStorage.getItem(ROUTE_TARGETS_STORAGE_KEY);
          if (!raw) return null;
          var data = JSON.parse(raw);
          var sp = data[spName];
          if (!sp) return null;
          var key = (depotName || '') + '|' + (routeName || '');
          return sp[key] != null ? Number(sp[key]) : null;
        } catch (e) { return null; }
      }

      function setStoredTarget(spName, depotName, routeName, value) {
        try {
          var raw = localStorage.getItem(ROUTE_TARGETS_STORAGE_KEY);
          var data = raw ? JSON.parse(raw) : {};
          if (!data[spName]) data[spName] = {};
          var key = (depotName || '') + '|' + (routeName || '');
          if (value === '' || value == null || isNaN(Number(value))) delete data[spName][key];
          else data[spName][key] = Number(value);
          localStorage.setItem(ROUTE_TARGETS_STORAGE_KEY, JSON.stringify(data));
        } catch (e) {}
      }

      function escapeHtml(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function matchesSearch(obj, search) {
        if (!search) return true;
        var q = search.toLowerCase();
        var sp = (obj.serviceProvider || '').toLowerCase();
        if (sp.indexOf(q) !== -1) return true;
        if (!obj.depots) return false;
        for (var d = 0; d < obj.depots.length; d++) {
          var dep = obj.depots[d];
          var dn = (dep.name || '').toLowerCase();
          if (dn.indexOf(q) !== -1) return true;
          if (!dep.loops) continue;
          for (var L = 0; L < dep.loops.length; L++) {
            var loop = dep.loops[L];
            var ln = (loop.name || '').toLowerCase();
            if (ln.indexOf(q) !== -1) return true;
            if (!loop.routes) continue;
            for (var r = 0; r < loop.routes.length; r++) {
              var route = loop.routes[r];
              var rn = (route.name || '').toLowerCase();
              if (rn.indexOf(q) !== -1) return true;
              var postcodes = route.postcodes || [];
              for (var s = 0; s < postcodes.length; s++) {
                var pc = String(postcodes[s]).toLowerCase();
                if (pc.indexOf(q) !== -1) return true;
                var sub = pc.length > 2 ? pc.slice(0, -2) : '';
                if (sub && sub.indexOf(q) !== -1) return true;
              }
            }
          }
        }
        return false;
      }

      function filterProvider(provider, search, filterSp, filterDepot) {
        if (filterSp && provider.serviceProvider !== filterSp) return null;
        if (!matchesSearch(provider, search)) return null;
        var depots = [];
        for (var d = 0; d < (provider.depots || []).length; d++) {
          var dep = provider.depots[d];
          if (filterDepot && (dep.name || '') !== filterDepot) continue;
          var loops = [];
          for (var L = 0; L < (dep.loops || []).length; L++) {
            var loop = dep.loops[L];
          var routes = (loop.routes || []).map(function (r) {
            return {
              name: r.name,
              type: r.type || 'Child',
              targetDel: r.targetDel != null ? r.targetDel : 0,
              targetPu: r.targetPu != null ? r.targetPu : 0,
              driver: r.driver || '',
              postcodes: r.postcodes || []
            };
          });
          var rate = typeof loop.deliveryRate === 'number' ? loop.deliveryRate : 0;
          loops.push({ name: loop.name, deliveryRate: rate, routes: routes });
          }
          if (loops.length) depots.push({ name: dep.name, loops: loops });
        }
        if (!depots.length) return null;
        return { serviceProvider: provider.serviceProvider, depots: depots };
      }

      var state = {
        data: contractData,
        filter: { search: '', serviceProvider: '', depot: '' },
        isLoading: false
      };

      var serviceProviders = (window.DHL_MOCK_DATA && window.DHL_MOCK_DATA.serviceProviders) ? window.DHL_MOCK_DATA.serviceProviders : [];

      function getDepotManagers(depotCode) {
        if (!depotCode) return [];
        var out = [];
        for (var i = 0; i < serviceProviders.length; i++) {
          var sp = serviceProviders[i];
          var managers = sp.depotManagers || {};
          var mgr = managers[depotCode];
          if (mgr) out.push({ serviceProvider: sp.name, name: mgr.name, email: mgr.email || '', phone: mgr.phone || '' });
        }
        return out;
      }

      function getFilteredData() {
        var list = state.data;
        var search = (state.filter.search || '').trim().toLowerCase();
        var sp = (state.filter.serviceProvider || '').trim();
        var depot = (state.filter.depot || '').trim();
        var out = [];
        for (var i = 0; i < list.length; i++) {
          var p = filterProvider(list[i], search || null, sp || null, depot || null);
          if (p) out.push(p);
        }
        return out;
      }

      function renderDepotManagerPanel() {
        var panel = document.getElementById('depotManagerPanel');
        var titleEl = document.getElementById('depotManagerTitle');
        var contentEl = document.getElementById('depotManagerContent');
        if (!panel || !titleEl || !contentEl) return;
        var depot = (state.filter.depot || '').trim();
        if (!depot) {
          panel.classList.add('hidden');
          return;
        }
        var managers = getDepotManagers(depot);
        panel.classList.remove('hidden');
        titleEl.textContent = 'Depot Manager – ' + depot;
        if (managers.length === 0) {
          contentEl.innerHTML = '<p class="text-muted mb-0">No manager assigned for this depot.</p>';
          return;
        }
        var html = '';
        for (var m = 0; m < managers.length; m++) {
          var mgr = managers[m];
          html += '<div class="depot-manager-card">';
          html += '<div class="depot-manager-card-header">' + escapeHtml(mgr.serviceProvider) + '</div>';
          html += '<div class="depot-manager-card-body">';
          html += '<p class="mb-1"><strong>' + escapeHtml(mgr.name) + '</strong></p>';
          if (mgr.email) html += '<p class="mb-1 small"><i class="bi bi-envelope me-1"></i><a href="mailto:' + escapeHtml(mgr.email) + '">' + escapeHtml(mgr.email) + '</a></p>';
          if (mgr.phone) html += '<p class="mb-0 small"><i class="bi bi-telephone me-1"></i>' + escapeHtml(mgr.phone) + '</p>';
          html += '</div></div>';
        }
        contentEl.innerHTML = html;
      }

      function renderTree() {
        var container = document.getElementById('contractTree');
        var emptyState = document.getElementById('emptyState');
        var loadingState = document.getElementById('loadingState');

        document.getElementById('loadingState').classList.add('hidden');
        if (state.isLoading) {
          container.innerHTML = '<div class="empty-state">Loading...</div>';
          emptyState.classList.add('hidden');
          return;
        }

        var filtered = getFilteredData();
        if (filtered.length === 0) {
          container.innerHTML = '';
          emptyState.classList.remove('hidden');
          return;
        }
        emptyState.classList.add('hidden');

        var idGen = 0;
        function nextId(prefix) {
          return 'cm-' + (prefix || '') + '-' + (idGen++);
        }

        var html = '';
        for (var i = 0; i < filtered.length; i++) {
          var prov = filtered[i];
          var spId = nextId('sp');
          html += '<div class="accordion mb-3" id="acc-sp-' + i + '">';
          html += '<div class="accordion-item">';
          html += '<h2 class="accordion-header">';
          html += '<button class="accordion-button py-3" type="button" data-bs-toggle="collapse" data-bs-target="#' + spId + '" aria-expanded="true">';
          html += '<i class="bi bi-building me-2 text-primary"></i> ';
          html += '<span class="fw-semibold">' + escapeHtml(prov.serviceProvider) + '</span>';
          html += '</button></h2>';
          html += '<div id="' + spId + '" class="accordion-collapse collapse show" data-bs-parent="#acc-sp-' + i + '">';
          html += '<div class="accordion-body pt-2 contract-block-inner">';

          for (var d = 0; d < prov.depots.length; d++) {
            var dep = prov.depots[d];
            var depId = nextId('dep');
            html += '<div class="accordion accordion-flush mb-2" id="acc-' + depId + '">';
            html += '<div class="accordion-item">';
            html += '<h3 class="accordion-header">';
            html += '<button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#' + depId + '" aria-expanded="false">';
            html += '<i class="bi bi-geo-alt me-2 text-secondary"></i> ' + escapeHtml(dep.name);
            html += '</button></h3>';
            html += '<div id="' + depId + '" class="accordion-collapse collapse" data-bs-parent="#acc-' + depId + '">';
            html += '<div class="accordion-body contract-block-inner">';

            for (var L = 0; L < dep.loops.length; L++) {
              var loop = dep.loops[L];
              var loopId = nextId('loop');
              html += '<div class="accordion accordion-flush mb-2">';
              html += '<div class="accordion-item">';
              html += '<h3 class="accordion-header">';
              html += '<button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#' + loopId + '" aria-expanded="false">';
              html += '<i class="bi bi-arrow-repeat me-2 text-secondary"></i> ' + escapeHtml(loop.name);
              html += '</button></h3>';
              html += '<div id="' + loopId + '" class="accordion-collapse collapse">';
              html += '<div class="accordion-body contract-block-inner">';

              html += '<div class="contract-rates-box">';
              html += '<p><strong class="text-dark">Child Rates:</strong> ';
              html += '<span class="text-muted">Band 1 (£3.67)</span> ';
              html += '<span class="text-muted">Band 2 (£3.33)</span> ';
              html += '<span class="text-muted">Band 3 (£3.10)</span> ';
              html += '<span class="text-muted">Band 4 (£2.74)</span></p>';
              html += '<p><strong class="text-dark">Flex Rates:</strong> ';
              html += '<span class="text-muted">Band 1: 1-80 (£3.30)</span> ';
              html += '<span class="text-muted">Band 2: 81-90 (£3.10)</span> ';
              html += '<span class="text-muted">Band 3: 91-100 (£2.90)</span> ';
              html += '<span class="text-muted">Band 4: 100+ (£2.60)</span></p>';
              html += '</div>';

              for (var r = 0; r < loop.routes.length; r++) {
                var route = loop.routes[r];
                var routeId = nextId('route');
                var subpostcodes = postcodesToSubpostcodes(route.postcodes);
                var storedTarget = getStoredTarget(prov.serviceProvider, dep.name, route.name);
                var targetVal = storedTarget != null ? storedTarget : (route.targetDel != null ? route.targetDel : 0);
                var typeClass = (route.type || 'Child') === 'Flex' ? 'contract-route-type-flex' : 'contract-route-type-child';
                var typeLabel = (route.type || 'Child');
                var spEsc = escapeHtml(prov.serviceProvider).replace(/'/g, '&#39;');
                var depEsc = escapeHtml(dep.name || '').replace(/'/g, '&#39;');
                var routeEsc = escapeHtml(route.name || '').replace(/'/g, '&#39;');
                html += '<div class="accordion accordion-flush mb-2">';
                html += '<div class="accordion-item">';
                html += '<h3 class="accordion-header">';
                html += '<button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#' + routeId + '" aria-expanded="false">';
                html += '<i class="bi bi-signpost-2 me-2 text-secondary"></i> ' + escapeHtml(route.name);
                html += '</button></h3>';
                html += '<div id="' + routeId + '" class="accordion-collapse collapse">';
                html += '<div class="accordion-body">';
                html += '<div class="contract-route-meta">';
                html += '<span>Type: <strong><span class="' + typeClass + '">' + escapeHtml(typeLabel) + '</span></strong></span>';
                if (route.driver) html += '<span>Driver: <strong>' + escapeHtml(route.driver) + '</strong></span>';
                html += '<span>Target: <strong class="js-route-target-display">' + targetVal + '</strong></span>';
                var rateVal = (loop.deliveryRate != null && !isNaN(loop.deliveryRate)) ? loop.deliveryRate : 0;
                var rateStr = rateVal > 0 ? '£' + rateVal.toFixed(2) : '—';
                html += '<span>Rate: <strong>' + rateStr + '</strong> <span class="text-muted small">(Band 1)</span></span>';
                html += '</div>';
                /* Apenas o Service Provider pode alterar o target; na vista DHL o target é só leitura */
                html += '<p class="small text-muted mb-2"><span class="contract-badge contract-badge-sub">Subpostcode</span></p>';
                html += '<div class="contract-subpostcodes">';
                for (var s = 0; s < subpostcodes.length; s++) {
                  html += '<span class="contract-subpostcode">' + escapeHtml(subpostcodes[s]) + '</span>';
                }
                html += '</div>';
                html += '</div></div></div></div>';
              }
              html += '</div></div></div></div>';
            }
            html += '</div></div></div></div>';
          }
          html += '</div></div></div></div>';
        }

        container.innerHTML = html;
      }

      function fillServiceProviderFilter() {
        var providers = [];
        var seen = {};
        state.data.forEach(function (p) {
          var n = p.serviceProvider || '';
          if (n && !seen[n]) { seen[n] = true; providers.push(n); }
        });
        providers.sort();
        var sel = document.getElementById('filterServiceProvider');
        var current = state.filter.serviceProvider;
        sel.innerHTML = '<option value="">All</option>' + providers.map(function (p) {
          return '<option value="' + escapeHtml(p) + '"' + (p === current ? ' selected' : '') + '>' + escapeHtml(p) + '</option>';
        }).join('');
      }

      function run() {
        fillServiceProviderFilter();
        renderTree();
        renderDepotManagerPanel();
      }

      document.getElementById('searchInput').addEventListener('input', function () {
        state.filter.search = this.value;
        run();
      });
      document.getElementById('filterServiceProvider').addEventListener('change', function () {
        state.filter.serviceProvider = this.value;
        run();
      });
      document.getElementById('filterDepot').addEventListener('change', function () {
        state.filter.depot = this.value;
        run();
      });
      document.getElementById('filterClearBtn').addEventListener('click', function () {
        state.filter.search = '';
        state.filter.serviceProvider = '';
        state.filter.depot = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('filterServiceProvider').value = '';
        var depotSel = document.getElementById('filterDepot');
        if (depotSel) depotSel.value = '';
        run();
      });

      /* Edição de target apenas na tela Contracts do Service Provider; aqui (DHL) é só leitura */
      run();
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../refinements-v3-motion.js" defer></script>
</body>
</html>
