<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicles – Administrative View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../vendor-admin-view.css" />
  <link rel="stylesheet" href="../../shared-pages.css" />
  <link rel="stylesheet" href="../../vehicles-admin-view.css" />
  <link rel="stylesheet" href="../../sidebar-beam.css" />
  <link rel="stylesheet" href="../../liquid-glass.css" />
  <link rel="stylesheet" href="../../modern-ui.css" />
</head>
<body class="has-beam-sidebar">
  <div class="sidebar-wrapper" id="sidebarWrapper">
    <div class="sidebar-gap" id="sidebarGap" aria-hidden="true"></div>
    <aside class="sidebar-container" id="sidebarContainer" aria-hidden="true"></aside>
    <div class="floating-sidebar-toggle" id="floatingSidebarToggle" aria-hidden="true"></div>

    <div class="beam-overlay" id="beamOverlay" aria-hidden="true"></div>
    <nav class="beam-sidebar" id="beamSidebar" data-state="closed" role="navigation" aria-label="Main menu">
      <button type="button" class="beam-trigger" id="beamTrigger" aria-label="Open menu" aria-expanded="false">
        <i class="bi bi-list beam-icon-menu"></i>
        <i class="bi bi-x-lg beam-icon-close"></i>
      </button>
      <div class="beam-rail" aria-hidden="true"></div>
      <div class="beam-plates">
        <a href="../dashboard/index.html" class="beam-plate">
          <i class="bi bi-house-door-fill beam-plate-icon"></i>
          <span>Home</span>
        </a>
        <a href="../../service-providers/index.html" class="beam-plate">
          <i class="bi bi-person-badge beam-plate-icon"></i>
          <span>Service Providers</span>
        </a>
        <a href="../vendor-admin-view/index.html" class="beam-plate">
          <i class="bi bi-building beam-plate-icon"></i>
          <span>Vendors</span>
        </a>
        <a href="index.html" class="beam-plate active">
          <i class="bi bi-truck beam-plate-icon"></i>
          <span>Vehicles</span>
        </a>
        <a href="../contract-management/index.html" class="beam-plate">
          <i class="bi bi-file-earmark-text beam-plate-icon"></i>
          <span>Contract Management</span>
        </a>
        <a href="../standard-operating-procedures/index.html" class="beam-plate">
          <i class="bi bi-journal-bookmark-fill beam-plate-icon"></i>
          <span>SOP Feed</span>
        </a>
        <a href="../access-select/index.html" class="beam-plate beam-plate--switch">
          <i class="bi bi-arrow-left-right beam-plate-icon"></i>
          <span>Select access</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-inset" id="sidebarInset">
      <div class="liquid-glass-page-bg" aria-hidden="true"></div>
      <div class="page-container">
        <div class="page-inner">
          <main class="vendor-admin-main vehicles-admin-main">
            <div class="admin-header d-flex flex-wrap align-items-center gap-2">
              <h1 class="admin-header-title">Vehicles</h1>
              <div class="admin-header-search flex-grow-1">
                <input
                  type="search"
                  id="searchInput"
                  class="form-control"
                  placeholder="VRN, Brand, Model, Registration date..."
                  autocomplete="off"
                />
              </div>
              <div class="admin-header-user-pill d-flex align-items-center" title="DHL Uk">
                <img src="../../assets/dhl-uk-logo.png" alt="DHL Uk" class="admin-header-user-avatar admin-header-user-avatar--img" />
                <span class="admin-header-user-name">DHL Uk</span>
              </div>
            </div>

            <div class="admin-filters" id="adminFilters">
              <div class="admin-filters-row row g-2 align-items-end flex-wrap">
                <div class="col-auto">
                  <label class="admin-filter-label form-label" for="filterServiceProvider">Service provider</label>
                  <select id="filterServiceProvider" class="admin-filter-select form-select form-select-sm" aria-label="Filter by service provider">
                    <option value="">All</option>
                  </select>
                </div>
                <div class="col-auto">
                  <label class="admin-filter-label form-label" for="filterFuelType">Fuel type</label>
                  <select id="filterFuelType" class="admin-filter-select form-select form-select-sm" aria-label="Filter by fuel type">
                    <option value="">All</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                  </select>
                </div>
                <div class="col-auto">
                  <label class="admin-filter-label form-label" for="filterVehicleType">Vehicle Type</label>
                  <select id="filterVehicleType" class="admin-filter-select form-select form-select-sm" aria-label="Filter by vehicle type">
                    <option value="">All</option>
                  </select>
                </div>
                <div class="col-auto">
                  <button type="button" class="admin-filter-clear btn btn-outline-secondary btn-sm" id="filterClearBtn" title="Clear filters and search">Clear filters</button>
                </div>
              </div>
            </div>

            <div class="table-wrap table-responsive">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th class="text-center">VRN</th>
                    <th class="text-center">Brand</th>
                    <th class="text-center">Model</th>
                    <th class="text-center">Registration Date</th>
                    <th class="text-center">Fuel Type</th>
                  </tr>
                </thead>
                <tbody id="vehiclesTableBody">
                </tbody>
              </table>
            </div>

            <div id="emptyState" class="empty-state alert alert-light hidden" role="status">
              Nenhum veículo encontrado.
            </div>
            <div id="loadingState" class="empty-state alert alert-light hidden" role="status">
              <span class="loading-spinner inline-block align-middle"></span>
              <span> Loading vehicles...</span>
            </div>
          </main>
        </div>
      </div>
    </div>

    <div id="vehicleModalBackdrop" class="modal-backdrop hidden" aria-hidden="true"></div>
    <div id="vehicleModalWrap" class="modal-dialog-wrap hidden" role="dialog" aria-modal="true" aria-labelledby="vehicleModalTitle">
      <div class="driver-modal" id="vehicleModalDialog">
        <div class="driver-modal-header">
          <div class="driver-modal-header-content">
            <span class="driver-modal-badge">Vehicle</span>
            <h2 id="vehicleModalTitle" class="driver-modal-title">—</h2>
          </div>
          <button type="button" class="driver-modal-close" id="vehicleModalClose" aria-label="Close">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="driver-modal-body" id="vehicleModalBody">
        </div>
      </div>
    </div>
  </div>

  <script src="../../dhl-mock-data.js"></script>
  <script src="../../beam-sidebar.js"></script>
  <script>
    (function () {
      'use strict';

      var SIDEBAR_STORAGE_KEY = 'dhl_subsystem_sidebar_state';

      function getSidebarOpen() {
        try {
          return localStorage.getItem(SIDEBAR_STORAGE_KEY) !== 'false';
        } catch (e) {
          return true;
        }
      }

      function setSidebarOpen(open) {
        try {
          localStorage.setItem(SIDEBAR_STORAGE_KEY, open ? 'true' : 'false');
        } catch (e) {}
      }

      function getSidebarState() {
        return getSidebarOpen() ? 'expanded' : 'collapsed';
      }

      function applySidebarState(state) {
        var wrapper = document.getElementById('sidebarWrapper');
        var gap = document.getElementById('sidebarGap');
        if (!wrapper || !gap) return;
        wrapper.setAttribute('data-sidebar-state', state);
        gap.setAttribute('data-sidebar-state', state);
        setSidebarOpen(state === 'expanded');
        window.dispatchEvent(new Event('resize'));
      }

      var sampleVehicles = (window.DHL_MOCK_DATA && window.DHL_MOCK_DATA.vehicles) ? window.DHL_MOCK_DATA.vehicles : [];

      function formatDateForDisplay(dateStr) {
        if (!dateStr) return '—';
        if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
          var parts = dateStr.split(/[-T\s]/);
          var y = parts[0], m = parts[1], d = (parts[2] || '').split('T')[0] || '—';
          if (!y || !m) return dateStr;
          return d + '/' + m + '/' + y;
        }
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        var day = String(d.getDate()).padStart(2, '0');
        var m = String(d.getMonth() + 1).padStart(2, '0');
        return day + '/' + m + '/' + d.getFullYear();
      }

      function escapeHtml(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function escapeAttr(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML.replace(/"/g, '&quot;');
      }

      var state = {
        vehicles: sampleVehicles,
        filter: { search: '', serviceProvider: '', fuelType: '', vehicleType: '' },
        isLoading: false
      };

      function applyFilters() {
        var list = state.vehicles;
        var search = (state.filter.search || '').toLowerCase().trim();
        var serviceProvider = (state.filter.serviceProvider || '').trim();
        var fuelFilter = (state.filter.fuelType || '').trim();
        var vehicleTypeFilter = (state.filter.vehicleType || '').trim();

        return list.filter(function (v) {
          if (search) {
            var vrn = (v.vrn || '').toLowerCase();
            var brand = (v.brand || '').toLowerCase();
            var model = (v.model || '').toLowerCase();
            var regDate = v.registrationDate ? formatDateForDisplay(v.registrationDate).toLowerCase() : '';
            var rawDate = (v.registrationDate || '').toLowerCase();
            if (vrn.indexOf(search) === -1 && brand.indexOf(search) === -1 && model.indexOf(search) === -1 && regDate.indexOf(search) === -1 && rawDate.indexOf(search) === -1) return false;
          }
          if (serviceProvider && (v.serviceProvider || '') !== serviceProvider) return false;
          if (fuelFilter && (v.fuelType || '') !== fuelFilter) return false;
          if (vehicleTypeFilter && (v.vehicleType || '') !== vehicleTypeFilter) return false;
          return true;
        });
      }

      function fillFilterSelects() {
        var list = state.vehicles;
        var providers = [], types = [];
        var seenP = {}, seenT = {};
        list.forEach(function (v) {
          var p = v.serviceProvider || '';
          if (p && !seenP[p]) { seenP[p] = true; providers.push(p); }
          var t = v.vehicleType || '';
          if (t && !seenT[t]) { seenT[t] = true; types.push(t); }
        });
        providers.sort();
        types.sort();
        var currentP = state.filter.serviceProvider;
        var currentT = state.filter.vehicleType;
        var selP = document.getElementById('filterServiceProvider');
        var selT = document.getElementById('filterVehicleType');
        selP.innerHTML = '<option value=""' + (currentP === '' ? ' selected' : '') + '>All</option>' + providers.map(function (p) {
          return '<option value="' + escapeAttr(p) + '"' + (p === currentP ? ' selected' : '') + '>' + escapeHtml(p) + '</option>';
        }).join('');
        selT.innerHTML = '<option value=""' + (currentT === '' ? ' selected' : '') + '>All</option>' + types.map(function (t) {
          return '<option value="' + escapeAttr(t) + '"' + (t === currentT ? ' selected' : '') + '>' + escapeHtml(t) + '</option>';
        }).join('');
      }

      function renderTable(filtered) {
        var tbody = document.getElementById('vehiclesTableBody');
        var emptyState = document.getElementById('emptyState');
        var loadingState = document.getElementById('loadingState');

        loadingState.classList.add('hidden');
        if (state.isLoading) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="padding:1rem; color:#6c757d;"><span class="loading-spinner inline-block align-middle"></span> Loading vehicles...</td></tr>';
          emptyState.classList.add('hidden');
          return;
        }

        if (filtered.length === 0) {
          tbody.innerHTML = '';
          emptyState.classList.remove('hidden');
          return;
        }

        emptyState.classList.add('hidden');
        var html = filtered.map(function (vehicle, index) {
          var regStr = formatDateForDisplay(vehicle.registrationDate);
          var fuelLabel = vehicle.fuelType || '—';
          var rowClass = index % 2 === 0 ? '' : ' style="background:#f8f9fa;"';
          var vehicleJson = encodeURIComponent(JSON.stringify(vehicle));
          return (
            '<tr class="vendor-row-clickable" data-vehicle="' + vehicleJson + '" data-vehicle-id="' + vehicle.id + '" role="button" tabindex="0" title="View vehicle details"' + rowClass + '>' +
              '<td class="text-center"><strong>' + escapeHtml(vehicle.vrn || '—') + '</strong></td>' +
              '<td class="text-center">' + escapeHtml(vehicle.brand || '—') + '</td>' +
              '<td class="text-center">' + escapeHtml(vehicle.model || '—') + '</td>' +
              '<td class="text-center">' + escapeHtml(regStr) + '</td>' +
              '<td class="text-center">' + escapeHtml(fuelLabel) + '</td>' +
            '</tr>'
          );
        }).join('');
        tbody.innerHTML = html;

        tbody.querySelectorAll('.vendor-row-clickable').forEach(function (row) {
          row.addEventListener('click', function () {
            var json = row.getAttribute('data-vehicle');
            if (!json) return;
            try {
              openVehicleModal(JSON.parse(decodeURIComponent(json)));
            } catch (e) {}
          });
          row.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              var json = row.getAttribute('data-vehicle');
              if (json) {
                try {
                  openVehicleModal(JSON.parse(decodeURIComponent(json)));
                } catch (err) {}
              }
            }
          });
        });
      }

      function openVehicleModal(vehicle) {
        var titleEl = document.getElementById('vehicleModalTitle');
        var bodyEl = document.getElementById('vehicleModalBody');

        titleEl.textContent = (vehicle.vrn || '—') + ' – ' + (vehicle.brand || '') + ' ' + (vehicle.model || '');

        var generalRows = [
          { label: 'VRN', value: vehicle.vrn || '—' },
          { label: 'Brand', value: vehicle.brand || '—' },
          { label: 'Model', value: vehicle.model || '—' },
          { label: 'Registration Date', value: formatDateForDisplay(vehicle.registrationDate) },
          { label: 'Fuel Type', value: vehicle.fuelType || '—' },
          { label: 'Vehicle Type', value: vehicle.vehicleType || '—' },
          { label: 'Service provider', value: vehicle.serviceProvider || '—' },
          { label: 'Color', value: vehicle.color || '—' },
          { label: 'Depot', value: vehicle.depot || '—' }
        ];

        var technicalItems = [
          { key: 'wrappedVehicle', label: 'Wrapped' },
          { key: 'slamLock', label: 'Slam Lock' },
          { key: 'camera', label: 'Camera' },
          { key: 'gps', label: 'GPS' },
          { key: 'bulkhead', label: 'Bulkhead' },
          { key: 'doors270', label: '270° Doors' }
        ];
        var technicalHtml = technicalItems.map(function (item) {
          var checked = vehicle[item.key];
          return '<div class="driver-modal-row driver-modal-row-checkbox">' +
            '<span class="driver-modal-label">' + escapeHtml(item.label) + '</span>' +
            '<span class="driver-modal-value"><input type="checkbox" class="vehicle-modal-checkbox" disabled' + (checked ? ' checked' : '') + ' /></span>' +
            '</div>';
        }).join('');

        var html =
          '<div class="driver-modal-grid">' +
            '<section class="driver-modal-section driver-modal-section-full">' +
              '<h3 class="driver-modal-section-title">General</h3>' +
              generalRows.map(function (r) {
                return '<div class="driver-modal-row"><span class="driver-modal-label">' + escapeHtml(r.label) + '</span><span class="driver-modal-value">' + escapeHtml(r.value) + '</span></div>';
              }).join('') +
            '</section>' +
            '<section class="driver-modal-section driver-modal-section-full">' +
              '<h3 class="driver-modal-section-title">Technical Information</h3>' +
              technicalHtml +
            '</section>' +
          '</div>';

        bodyEl.innerHTML = html;

        document.getElementById('vehicleModalBackdrop').classList.remove('hidden');
        document.getElementById('vehicleModalWrap').classList.remove('hidden');
      }

      function closeVehicleModal() {
        document.getElementById('vehicleModalBackdrop').classList.add('hidden');
        document.getElementById('vehicleModalWrap').classList.add('hidden');
      }

      function run() {
        fillFilterSelects();
        var filtered = applyFilters();
        renderTable(filtered);
      }

      document.getElementById('searchInput').addEventListener('input', function () {
        state.filter.search = this.value;
        run();
      });
      document.getElementById('filterServiceProvider').addEventListener('change', function () {
        state.filter.serviceProvider = this.value;
        run();
      });
      document.getElementById('filterFuelType').addEventListener('change', function () {
        state.filter.fuelType = this.value;
        run();
      });
      document.getElementById('filterVehicleType').addEventListener('change', function () {
        state.filter.vehicleType = this.value;
        run();
      });
      document.getElementById('filterClearBtn').addEventListener('click', function () {
        state.filter.search = '';
        state.filter.serviceProvider = '';
        state.filter.fuelType = '';
        state.filter.vehicleType = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('filterServiceProvider').value = '';
        document.getElementById('filterFuelType').value = '';
        document.getElementById('filterVehicleType').value = '';
        run();
      });

      document.getElementById('vehicleModalClose').addEventListener('click', closeVehicleModal);
      document.getElementById('vehicleModalBackdrop').addEventListener('click', closeVehicleModal);
      document.getElementById('vehicleModalWrap').addEventListener('click', function (e) {
        if (e.target === document.getElementById('vehicleModalWrap')) closeVehicleModal();
      });
      document.getElementById('vehicleModalDialog').addEventListener('click', function (e) { e.stopPropagation(); });

      run();
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
