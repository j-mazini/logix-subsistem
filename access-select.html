<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select access – DHL Subsystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="access-select.css" />
</head>
<body>
  <div class="access-select-page">
    <header class="access-select-header">
      <h1>DHL Subsystem</h1>
      <p>Select which area you want to access</p>
    </header>

    <div class="access-select-grid">
      <a href="dashboard.html" class="access-select-card access-select-card--dhl">
        <div class="access-select-card-icon">
          <i class="bi bi-building-gear"></i>
        </div>
        <h2>DHL Administration</h2>
        <p>Dashboard, Service Providers, Vendors, Vehicles, Contracts, SOP Feed. Create alerts and posts.</p>
      </a>

      <a href="sp-portal/login.html" class="access-select-card access-select-card--sp">
        <div class="access-select-card-icon">
          <i class="bi bi-person-badge"></i>
        </div>
        <h2>BA Express Portal</h2>
        <p>Sign in to access the BA Express portal: dashboard, profile, drivers, vehicles and contracts.</p>
      </a>
    </div>
  </div>
</body>
</html>
